<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JamboUG | Explore the Pearl</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FFCE00; /* Ugandan Gold */
            --accent: #E52B50;  /* Crane Red */
            --bg: #0a0a0a;      /* Deep Charcoal */
            --card-bg: #1a1a1a;
            --text: #ffffff;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; } /* Custom cursor active */

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            line-height: 1.4;
        }

        /* Custom Cursor */
        #cursor {
            width: 20px; height: 20px;
            background: var(--primary);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.1s ease;
        }

        /* Animated Navigation */
        nav {
            position: fixed;
            top: 0; width: 100%;
            padding: 30px 6%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            mix-blend-mode: difference;
        }

        .logo { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; letter-spacing: -1px; }
        .logo span { color: var(--primary); }

        /* Hero with Perspective */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, rgba(30, 81, 40, 0.4) 0%, transparent 70%),
                        url('https://images.unsplash.com/photo-1518218811728-66a9f8348827?auto=format&fit=crop&w=1600&q=80') center/cover;
            perspective: 1000px;
        }

        .hero h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(3rem, 10vw, 8rem);
            line-height: 0.9;
            text-transform: uppercase;
            text-align: center;
        }

        /* Magnetic Button */
        .cta-btn {
            margin-top: 40px;
            padding: 20px 40px;
            background: var(--primary);
            color: black;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 800;
            text-transform: uppercase;
            transition: 0.3s;
            position: relative;
        }

        .cta-btn:hover { transform: scale(1.1); background: white; }

        /* Draggable Grid with 3D Tilt */
        .section-header { padding: 100px 6% 40px; }
        .section-header h2 { font-family: 'Syne', sans-serif; font-size: 3rem; }

        .drag-wrapper {
            padding: 20px 6%;
            display: flex;
            gap: 40px;
            overflow-x: auto;
            scroll-behavior: smooth;
            scrollbar-width: none;
        }

        .drag-wrapper::-webkit-scrollbar { display: none; }

        .cool-card {
            min-width: 400px;
            height: 500px;
            background: var(--card-bg);
            border-radius: 30px;
            overflow: hidden;
            position: relative;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .cool-card:hover { transform: translateY(-20px) rotateX(5deg) rotateY(5deg); }

        .cool-card img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; transition: 0.5s; }
        .cool-card:hover img { opacity: 0.9; scale: 1.1; }

        .card-meta {
            position: absolute;
            bottom: 30px; left: 30px;
            z-index: 2;
        }

        .card-meta h3 { font-family: 'Syne', sans-serif; font-size: 2rem; margin-bottom: 5px; }
        .tag { background: var(--primary); color: black; padding: 5px 12px; border-radius: 5px; font-size: 0.8rem; font-weight: bold; }

        /* Parallax Section */
        .parallax-box {
            height: 60vh;
            margin: 100px 6%;
            border-radius: 40px;
            background: fixed center/cover url('https://images.unsplash.com/photo-1547471080-7cc2caa01a7e?auto=format&fit=crop&w=1600&q=80');
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .parallax-box h2 { font-size: 4rem; text-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        footer { padding: 100px 6%; border-top: 1px solid var(--glass); text-align: center; opacity: 0.6; }

    </style>
</head>
<body>

    <div id="cursor"></div>

    <nav>
        <div class="logo">Jambo<span>UG</span></div>
        <div>STORY — FLAVOR — WILD</div>
    </nav>

    <header class="hero">
        <h1 data-speed="2">UGANDA<br><span style="color:var(--primary)">UNFILTERED</span></h1>
        <a href="#" class="cta-btn">Start the Journey</a>
    </header>

    <div class="section-header">
        <p style="color:var(--primary); letter-spacing: 3px;">01. THE TASTE</p>
        <h2>Soul Food</h2>
    </div>

    <div class="drag-wrapper" id="slider">
        <div class="cool-card">
            <img src="https://images.unsplash.com/photo-1626700051175-656fc7bc31ee?auto=format&fit=crop&w=800&q=80">
            <div class="card-meta">
                <span class="tag">STREET FOOD</span>
                <h3>The Rolex</h3>
            </div>
        </div>
        <div class="cool-card">
            <img src="https://images.unsplash.com/photo-1541014741259-de529411b96a?auto=format&fit=crop&w=800&q=80">
            <div class="card-meta">
                <span class="tag">ROYALTY</span>
                <h3>Luwombo</h3>
            </div>
        </div>
        <div class="cool-card">
            <img src="https://images.unsplash.com/photo-1512621776951-a57141f2eefd?auto=format&fit=crop&w=800&q=80">
            <div class="card-meta">
                <span class="tag">GRILLED</span>
                <h3>Muchomo</h3>
            </div>
        </div>
    </div>

    <div class="parallax-box">
        <h2>KING OF THE JUNGLE</h2>
    </div>

    <footer>
        <p>&copy; 2026 JamboUG. Built for the bold traveller.</p>
    </footer>

    <script>
        // 1. Custom Cursor Movement
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // 2. Drag to Scroll with Velocity
        const slider = document.getElementById('slider');
        let isDown = false;
        let startX;
        let scrollLeft;

        slider.addEventListener('mousedown', (e) => {
            isDown = true;
            slider.style.cursor = 'grabbing';
            startX = e.pageX - slider.offsetLeft;
            scrollLeft = slider.scrollLeft;
        });
        slider.addEventListener('mouseleave', () => isDown = false);
        slider.addEventListener('mouseup', () => {
            isDown = false;
            slider.style.cursor = 'grab';
        });
        slider.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            e.preventDefault();
            const x = e.pageX - slider.offsetLeft;
            const walk = (x - startX) * 2;
            slider.scrollLeft = scrollLeft - walk;
        });

        // 3. Simple Parallax Effect on Hero Text
        window.addEventListener('scroll', () => {
            const scroll = window.pageYOffset;
            const heroText = document.querySelector('.hero h1');
            heroText.style.transform = `translateY(${scroll * 0.4}px)`;
        });
    </script>
</body>
</html>
